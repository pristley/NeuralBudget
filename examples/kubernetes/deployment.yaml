apiVersion: apps/v1
kind: Deployment
metadata:
  name: neuralbudget-evaluator
  labels:
    app: neuralbudget-evaluator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neuralbudget-evaluator
  template:
    metadata:
      labels:
        app: neuralbudget-evaluator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: api
          image: ghcr.io/pristley/neuralbudget-evaluator:v0.1.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: NB_CONFIG_PATH
              value: /etc/neuralbudget/slo.yaml
            - name: NB_LOG_LEVEL
              value: info
          volumeMounts:
            - name: nb-config
              mountPath: /etc/neuralbudget
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: nb-config
          configMap:
            name: neuralbudget-config
