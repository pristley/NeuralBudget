mode: genai

agent_slo:
  enabled: true
  
  trajectory_metrics:
    # Maximum number of steps agent should take (hard limit)
    max_steps: 10
    
    # Minimum acceptable tool call success rate
    # 95% = accept occasional tool failures
    tool_success_threshold: 0.95
    
    # Maximum times the same action can repeat
    # Flags infinite loops (e.g., search → search → search)
    max_repeated_actions: 2
    
    # Minimum acceptable overall success rate
    # 90% = accept occasional task failures
    success_threshold: 0.90
  
  # Enable loop detection
  loop_detection_enabled: true

# Sample agent execution trajectory
# This is what gets evaluated
sample:
  timestamp: 1719446400  # Unix timestamp
  agent_run_id: "agent_run_123"
  
  trajectory:
    # Step 1: Agent decides to search for information
    - step: 1
      action: "thought"
      tool_name: null
      success: true
      output: "I need to search for latest AI trends"
      duration_ms: 50

    # Step 2: First tool call - web search
    - step: 2
      action: "tool_call"
      tool_name: "google_search"
      success: true
      output: "Found 5 relevant articles about AI trends in 2026"
      duration_ms: 800

    # Step 3: Second tool call - fetch and parse content
    - step: 3
      action: "tool_call"
      tool_name: "fetch_url"
      success: true
      output: "Retrieved article content (2500 tokens)"
      duration_ms: 400

    # Step 4: Third tool call - summarize content
    - step: 4
      action: "tool_call"
      tool_name: "summarize"
      success: true
      output: "Summary: Key trends in multimodal models, scaling laws, and efficient inference"
      duration_ms: 600

    # Step 5: Agent generates final response
    - step: 5
      action: "response"
      tool_name: null
      success: true
      output: "Based on my research, the top 3 AI trends in 2026 are..."
      duration_ms: 200

  final_status: "success"

# Evaluation results:
# - Max steps: 5 <= 10 ✓
# - Tool success rate: 3/3 = 100% >= 95% ✓
# - Loop detected: false ✓ (no action repeated > 2 times)
# - Final success: true ✓
# - Pass: true ✓
