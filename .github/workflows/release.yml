name: Release Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (for example: v0.1.4)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  prepare-release-artifacts:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve_tag.outputs.release_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release tag
        id: resolve_tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "$tag" || "$tag" != v* ]]; then
            echo "Expected a v* tag, got: $tag" >&2
            exit 1
          fi

          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install maturin
        run: python3 -m pip install --upgrade pip maturin

      - name: Generate changelog and release notes
        run: python3 scripts/update_changelog.py "${{ steps.resolve_tag.outputs.release_tag }}" release-notes.md

      - name: Build source distribution
        run: maturin sdist --manifest-path Cargo.toml --out dist

      - name: Package crate
        run: cargo package --allow-dirty --no-verify

      - name: Upload release core artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-core
          path: |
            dist/*.tar.gz
            target/package/*.crate
            release-notes.md
          if-no-files-found: error

  build-release-wheels:
    if: github.actor != 'github-actions[bot]'
    needs: prepare-release-artifacts
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            maturin_args: --release --out dist --interpreter /opt/python/cp39-cp39/bin/python /opt/python/cp310-cp310/bin/python /opt/python/cp311-cp311/bin/python /opt/python/cp312-cp312/bin/python /opt/python/cp313-cp313/bin/python /opt/python/cp314-cp314/bin/python

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Build wheels with maturin
        uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          args: ${{ matrix.maturin_args }}

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  github-release:
    if: github.actor != 'github-actions[bot]'
    needs:
      - prepare-release-artifacts
      - build-release-wheels
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release-artifacts.outputs.release_tag }}
          name: ${{ needs.prepare-release-artifacts.outputs.release_tag }}
          files: |
            dist/**/*.crate
            dist/**/*.whl
            dist/**/*.tar.gz
          body_path: dist/release-notes.md

  publish-pypi:
    if: github.actor != 'github-actions[bot]'
    needs:
      - prepare-release-artifacts
      - build-release-wheels
    runs-on: ubuntu-latest
    env:
      HAS_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN != '' }}
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    environment:
      name: pypi
      url: https://pypi.org/project/neuralbudget/

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-wheels-*
          path: dist
          merge-multiple: true

      - name: Download source distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: release-core
          path: dist
          merge-multiple: true

      - name: Collect Python distribution files
        run: |
          mkdir -p dist/pypi
          find dist -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec cp -f {} dist/pypi/ \;
          ls -1 dist/pypi

      - name: Install twine
        run: python3 -m pip install --upgrade twine

      - name: Validate distributions
        run: python3 -m twine check dist/pypi/*.whl dist/pypi/*.tar.gz

      - name: Publish to PyPI (API token)
        if: env.HAS_PYPI_TOKEN == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi
          password: ${{ env.PYPI_API_TOKEN }}
          skip-existing: true

      - name: Publish to PyPI (trusted publishing)
        if: env.HAS_PYPI_TOKEN != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi
          skip-existing: true
