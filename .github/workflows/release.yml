name: CD

on:
  push:
    branches:
      - main
    paths-ignore:
      - CHANGELOG.md
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  package:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install LLVM coverage tools
        run: rustup component add llvm-tools-preview --toolchain stable

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Install maturin
        run: python3 -m pip install --upgrade pip maturin

      - name: Fetch dependencies
        run: cargo fetch

      - name: Generate changelog and release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: python3 scripts/update_changelog.py "${GITHUB_REF_NAME}" release-notes.md

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run unit tests (library)
        run: cargo test --lib --all-features

      - name: Run unit tests (all targets)
        run: cargo test --all-targets --all-features

      - name: Run documentation tests
        run: cargo test --doc --all-features

      - name: Run integration test suites
        run: cargo test --tests --all-features

      - name: Run MLOps model-drift serving tests
        run: cargo test --all-features ml_slo -- --nocapture

      - name: Run Python convenience layer tests
        run: |
          python3 tests/python_convenience_tests.py
          python3 tests/python_client_tests.py

      - name: Run coverage gate
        run: cargo llvm-cov --workspace --all-features --lib --tests --summary-only --fail-under-lines 87

      - name: Build Python wheel
        run: maturin build --release --manifest-path Cargo.toml

      - name: Package crate
        run: cargo package --allow-dirty --no-verify

      - name: Build source distribution
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message || '', '[release-main-publish]'))
        run: maturin sdist --manifest-path Cargo.toml --out target/wheels

      - name: Upload packaged crate metadata
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        with:
          name: release-crate
          path: target/package/*.crate
          if-no-files-found: error

      - name: Upload Python wheel artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: neuralbudget-wheel-linux
          path: target/wheels/*.whl
          if-no-files-found: error

      - name: Upload release notes artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: error

      - name: Upload source distribution artifact
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message || '', '[release-main-publish]'))
        with:
          name: release-sdist
          path: target/wheels/*.tar.gz
          if-no-files-found: error

      - name: Commit changelog update
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update changelog for ${GITHUB_REF_NAME} [skip ci]"
          git push origin HEAD:main

  build-release-wheels:
    if: (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message || '', '[release-main-publish]'))) && github.actor != 'github-actions[bot]'
    needs: package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            maturin_args: --release --out dist --interpreter /opt/python/cp39-cp39/bin/python /opt/python/cp310-cp310/bin/python /opt/python/cp311-cp311/bin/python /opt/python/cp312-cp312/bin/python /opt/python/cp313-cp313/bin/python /opt/python/cp314-cp314/bin/python
          - os: windows-latest
            target: x86_64
            maturin_args: --release --out dist --find-interpreter
          - os: macos-14
            target: aarch64
            maturin_args: --release --out dist --find-interpreter

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build wheels with maturin
        uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          args: ${{ matrix.maturin_args }}

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  github-release:
    if: startsWith(github.ref, 'refs/tags/v') && github.actor != 'github-actions[bot]'
    needs:
      - package
      - build-release-wheels
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.crate
            dist/**/*.whl
            dist/**/*.tar.gz
          body_path: dist/release-notes.md

  publish-pypi:
    if: (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message || '', '[release-main-publish]'))) && github.actor != 'github-actions[bot]'
    needs:
      - package
      - build-release-wheels
    runs-on: ubuntu-latest
    env:
      HAS_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN != '' }}
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    environment:
      name: pypi
      url: https://pypi.org/p/neuralbudget

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-wheels-*
          path: dist
          merge-multiple: true

      - name: Download source distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: release-sdist
          path: dist
          merge-multiple: true

      - name: Publish to PyPI (API token)
        if: env.HAS_PYPI_TOKEN == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ env.PYPI_API_TOKEN }}
          skip-existing: true

      - name: Publish to PyPI (trusted publishing)
        if: env.HAS_PYPI_TOKEN != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true