name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - CHANGELOG.md
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install build tools
        run: |
          cargo install cargo-llvm-cov --locked
          python3 -m pip install --upgrade pip maturin

      - name: Fetch dependencies
        run: cargo fetch

      - name: Check code formatting
        run: cargo fmt --all --check

      - name: Lint with Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        run: cargo test --all-features

      - name: Run documentation tests
        run: cargo test --doc --all-features

      - name: Run Python tests
        run: |
          python3 tests/python_streaming_aggregator_tests.py
          python3 tests/python_comprehensive_tests.py
          python3 tests/python_functional_integration_tests.py
          python3 tests/python_convenience_tests.py
          python3 tests/python_client_tests.py

      - name: Generate coverage report
        run: cargo llvm-cov --workspace --all-features --lib --tests --summary-only --fail-under-lines 70

      - name: Build Python wheel
        run: maturin build --release --manifest-path Cargo.toml

      - name: Verify wheel contents
        run: |
          WHEEL=$(ls target/wheels/neuralbudget-*.whl | head -1)
          echo "Built wheel: $WHEEL"
          unzip -l "$WHEEL" | grep -E '(\.so|__init__|METADATA)' | head -10

