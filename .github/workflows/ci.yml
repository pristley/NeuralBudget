name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - CHANGELOG.md
  pull_request:
    branches:
      - main

# Cancel in-progress runs for the same PR or branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Fast checks – run in parallel with the main build
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Rust registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Clippy lint
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Build, test, and coverage – depends on lint to fail fast
  test-build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Rust registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: >
            ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install maturin
        run: |
          python3 -m pip install --upgrade pip
          pip install maturin

      - name: Run tests with coverage
        run: >
          cargo llvm-cov --workspace --all-features --tests --lib
          --summary-only --fail-under-lines 75

      - name: Run doc tests
        run: cargo test --doc --all-features

      - name: Build wheel
        run: maturin build --release --manifest-path Cargo.toml

      - name: Verify wheel contents
        run: |
          WHEEL=$(ls target/wheels/neuralbudget-*.whl | head -1)
          echo "Built wheel: $WHEEL"
          unzip -l "$WHEEL" | grep -E '(\.so|__init__|METADATA)' | head -10

      - name: Install wheel and run Python tests
        run: |
          pip install --force-reinstall target/wheels/neuralbudget-*.whl
          python3 tests/python_streaming_aggregator_tests.py
          python3 tests/python_comprehensive_tests.py
          python3 tests/python_functional_integration_tests.py
          python3 tests/python_convenience_tests.py
          python3 tests/python_client_tests.py
