name: CD

on:
  push:
    branches:
      - main
    paths-ignore:
      - CHANGELOG.md
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install LLVM coverage tools
        run: rustup component add llvm-tools-preview --toolchain stable

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Install maturin
        run: python3 -m pip install --upgrade pip maturin

      - name: Fetch dependencies
        run: cargo fetch

      - name: Generate changelog and release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: python3 scripts/update_changelog.py "${GITHUB_REF_NAME}" release-notes.md

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run unit tests
        run: cargo test --lib --all-features

      - name: Run documentation tests
        run: cargo test --doc --all-features

      - name: Run external test suites
        run: cargo test --tests --all-features

      - name: Run coverage gate
        run: cargo llvm-cov --workspace --all-features --summary-only --fail-under-lines 89

      - name: Build Python wheel
        run: maturin build --release --manifest-path Cargo.toml

      - name: Package crate
        run: cargo package --allow-dirty --no-verify

      - name: Upload packaged crate metadata
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: neuralbudget-package
          path: target/package/*.crate
          if-no-files-found: error

      - name: Upload Python wheel artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: neuralbudget-wheel
          path: target/wheels/*.whl
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/package/*.crate
            target/wheels/*.whl
          body_path: release-notes.md

      - name: Commit changelog update
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update changelog for ${GITHUB_REF_NAME} [skip ci]"
          git push origin HEAD:main