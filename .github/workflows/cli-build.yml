name: CLI Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build CLI - ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
            artifact: neuralbudget
          
          # Linux ARM64
          - os: ubuntu-latest
            platform: linux-arm64
            target: aarch64-unknown-linux-gnu
            artifact: neuralbudget
          
          # macOS x86_64 (Intel)
          - os: macos-latest
            platform: macos-x86_64
            target: x86_64-apple-darwin
            artifact: neuralbudget
          
          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            platform: macos-arm64
            target: aarch64-apple-darwin
            artifact: neuralbudget
          
          # Windows
          - os: windows-latest
            platform: windows-x86_64
            target: x86_64-pc-windows-msvc
            artifact: neuralbudget.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for ARM64 on Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross

      - name: Build CLI (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --bin neuralbudget --target ${{ matrix.target }}

      - name: Build CLI (cross-compiled)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --bin neuralbudget --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neuralbudget-${{ matrix.platform }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}
          retention-days: 30

  test:
    name: Test CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run CLI tests
        run: cargo test --test cli_integration_tests --verbose

      - name: Run all library tests (to ensure CLI doesn't break core)
        run: cargo test --lib --verbose

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/neuralbudget
          tags: |
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=ref,event=branch
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, test]

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-homebrew:
    name: Publish to Homebrew
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    
    steps:
      - name: Trigger homebrew-core PR
        uses: actions/github-script@v7
        with:
          script: |
            // This would trigger a Homebrew PR update
            // Implementation depends on homebrew-core workflow
            console.log('Homebrew publishing would be triggered here');

  publish-aur:
    name: Publish to AUR
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    
    steps:
      - name: Trigger AUR update
        uses: actions/github-script@v7
        with:
          script: |
            // This would trigger an AUR update
            // Implementation depends on AUR package maintenance
            console.log('AUR publishing would be triggered here');

  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build CLI
        run: cargo build --release --bin neuralbudget

      - name: Benchmark eval command
        run: |
          echo "Testing eval performance..."
          time ./target/release/neuralbudget eval examples/slo_http.yaml examples/sample_http.json

      - name: Benchmark gen-rules command
        run: |
          echo "Testing gen-rules performance..."
          time ./target/release/neuralbudget gen-rules examples/slo_http.yaml > /dev/null

      - name: Benchmark check command
        run: |
          echo "Testing check performance..."
          time ./target/release/neuralbudget check examples/slo_http.yaml > /dev/null
