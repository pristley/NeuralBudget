[advisories]
ignore = [
  # RUSTSEC-2026-0176 affects PyList/PyTuple iterator nth/nth_back internals.
  # NeuralBudget does not call these iterator methods in Rust-side PyO3 bindings.
  "RUSTSEC-2026-0176",
  # RUSTSEC-2026-0177 affects PyCFunction::new_closure/new_closure_bound usage.
  # NeuralBudget does not use those APIs (verified by code search), so this
  # advisory is currently not applicable to this codebase.
  "RUSTSEC-2026-0177",
]
