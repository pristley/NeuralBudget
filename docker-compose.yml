version: '3.8'

services:
  neuralbudget:
    build: .
    image: neuralbudget:latest
    container_name: neuralbudget-cli
    volumes:
      - ./examples:/examples
      - ./configs:/configs
    command: --help
    
  # Optional: HTTP server mode (when implemented)
  neuralbudget-server:
    build: .
    image: neuralbudget:latest
    container_name: neuralbudget-server
    ports:
      - "8080:8080"
    command: serve --port 8080 --bind 0.0.0.0
    # Uncomment when serve command is implemented
    # profiles:
    #   - server
